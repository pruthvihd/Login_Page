<!--
Fix for Firebase: Error (auth/invalid-login-credentials)

This happens when the email/password combination is incorrect or when the user account doesn’t exist.
The updated code adds more user-friendly handling for `auth/invalid-login-credentials`, prompting users to verify their input or sign up if needed.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login / Signup — Firebase Auth</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{display:flex;align-items:center;justify-content:center;font-family:Inter,system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial;background:linear-gradient(135deg,#f6f7fb,#eef2ff);padding:24px}
    .card{width:100%;max-width:520px;background:white;border-radius:12px;box-shadow:0 10px 30px rgba(22,27,38,0.08);overflow:hidden}
    .card-header{padding:28px 28px 18px}
    .card-body{padding:18px 28px 28px}
    label{font-size:13px;color:#334155}
    input{width:100%;padding:12px 14px;border:1px solid #e6e9ef;border-radius:8px;font-size:14px;margin-top:4px}
    .actions{display:flex;gap:8px;margin-top:10px}
    button{flex:1;padding:10px 12px;border-radius:8px;border:0;font-weight:600;cursor:pointer}
    .btn-primary{background:#4f46e5;color:white}
    .btn-secondary{background:#eef2ff;color:#1e3a8a}
    .error{color:#b91c1c;background:#fff1f2;padding:10px;border-radius:8px;border:1px solid rgba(185,28,28,0.08);margin-bottom:10px}
    .success{color:#065f46;background:#ecfdf5;padding:10px;border-radius:8px;border:1px solid rgba(6,95,70,0.08);margin-bottom:10px}
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>Login / Signup</h1>
      <p>Firebase Authentication Example (Email/Password)</p>
    </div>
    <div class="card-body">
      <div id="messages"></div>
      <form id="auth-form">
        <label>Email</label>
        <input id="email" type="email" placeholder="Enter email" required />
        <label>Password</label>
        <input id="password" type="password" placeholder="Enter password" required />
        <div class="actions">
          <button id="login-btn" type="button" class="btn-primary">Login</button>
          <button id="signup-btn" type="button" class="btn-secondary">Sign Up</button>
        </div>
      </form>
      <button id="signout-btn" class="btn-secondary" style="display:none;margin-top:10px">Sign Out</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js';

    // Replace with your real Firebase project config
   
      // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyA6Ht6fzRJQbAc3zr867uDLw6E05N5gjmE",
  authDomain: "loginpage-dfb7a.firebaseapp.com",
  projectId: "loginpage-dfb7a",
  storageBucket: "loginpage-dfb7a.firebasestorage.app",
  messagingSenderId: "1046072878393",
  appId: "1:1046072878393:web:a7258b78e21c8d115134e8",
  measurementId: "G-N0B4KB80W4"
};


    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const emailEl = document.getElementById('email');
    const passwordEl = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const signupBtn = document.getElementById('signup-btn');
    const signoutBtn = document.getElementById('signout-btn');
    const messages = document.getElementById('messages');

    function showMessage(msg, type='error') {
      messages.innerHTML = `<div class="${type}">${msg}</div>`;
    }

    loginBtn.addEventListener('click', async () => {
      try {
        await signInWithEmailAndPassword(auth, emailEl.value, passwordEl.value);
        showMessage('Login successful!', 'success');
      } catch (err) {
        console.error(err);
        if (err.code === 'auth/invalid-login-credentials') {
          showMessage('Invalid email or password. Please check your credentials or sign up.', 'error');
        } else {
          showMessage(err.message, 'error');
        }
      }
    });

    signupBtn.addEventListener('click', async () => {
      try {
        await createUserWithEmailAndPassword(auth, emailEl.value, passwordEl.value);
        showMessage('Signup successful! You are now logged in.', 'success');
      } catch (err) {
        console.error(err);
        showMessage(err.message, 'error');
      }
    });

    signoutBtn.addEventListener('click', async () => {
      await signOut(auth);
      showMessage('You have been signed out.', 'success');
    });

    onAuthStateChanged(auth, user => {
      if (user) {
        signoutBtn.style.display = 'block';
      } else {
        signoutBtn.style.display = 'none';
      }
    });
  </script>
</body>
</html>
